services:
  likevercel:
    build: .
    image: likevercel-backend:latest
    container_name: likevercel-app
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

networks:
  default:
    driver: bridge
